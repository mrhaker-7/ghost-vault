<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GHOST VAULT | mrhaker-7</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <style>
        body { background: #000; margin: 0; overflow: hidden; font-family: 'Courier New', monospace; }
        canvas { position: fixed; top: 0; left: 0; z-index: 1; }
        
        .vault-ui {
            position: relative; z-index: 2;
            display: flex; justify-content: center; align-items: center;
            height: 100vh; width: 100vw;
        }

        .terminal {
            background: rgba(0, 5, 0, 0.9);
            border: 2px solid #0f0;
            box-shadow: 0 0 20px #0f0;
            padding: 25px; width: 90%; max-width: 400px;
            border-radius: 5px; text-align: center;
        }

        h1 { color: #0f0; text-shadow: 0 0 10px #0f0; letter-spacing: 3px; font-size: 1.5rem; }
        textarea, input {
            width: 100%; background: #000; border: 1px solid #0f0;
            color: #0f0; padding: 10px; margin-bottom: 10px;
            box-sizing: border-box; outline: none; font-family: inherit;
        }
        button {
            width: 48%; padding: 12px; background: #0f0; color: #000;
            border: none; font-weight: bold; cursor: pointer; transition: 0.3s;
        }
        button.alt { background: transparent; color: #0f0; border: 1px solid #0f0; }
        #output { color: #0f0; margin-top: 15px; font-size: 12px; word-break: break-all; border-top: 1px solid #0f0; padding-top: 10px; }
    </style>
</head>
<body>

<canvas id="matrix"></canvas>

<div class="vault-ui">
    <div class="terminal">
        <h1>GHOST_VAULT v2</h1>
        <textarea id="data" rows="3" placeholder="// ENTER DATA..."></textarea>
        <input type="password" id="key" placeholder="// MASTER_KEY">
        <div style="display: flex; justify-content: space-between;">
            <button onclick="enc()">ENCRYPT</button>
            <button class="alt" onclick="dec()">DECRYPT</button>
        </div>
        <div id="output">SYSTEM_READY...</div>
    </div>
</div>

<script>
    // --- MATRIX RAIN EFFECT ---
    const canvas = document.getElementById('matrix');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    const letters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789@#$%^&*()*&^%";
    const fontSize = 16;
    const columns = canvas.width / fontSize;
    const drops = Array(Math.floor(columns)).fill(1);

    function draw() {
        ctx.fillStyle = "rgba(0, 0, 0, 0.05)";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "#0f0";
        ctx.font = fontSize + "px monospace";
        for (let i = 0; i < drops.length; i++) {
            const text = letters[Math.floor(Math.random() * letters.length)];
            ctx.fillText(text, i * fontSize, drops[i] * fontSize);
            if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
            drops[i]++;
        }
    }
    setInterval(draw, 33);

    // --- ENCRYPTION LOGIC ---
    function enc() {
        const msg = document.getElementById('data').value;
        const k = document.getElementById('key').value;
        if(!k) return alert("KEY REQUIRED");
        document.getElementById('output').innerText = CryptoJS.AES.encrypt(msg, k).toString();
    }
    function dec() {
        const msg = document.getElementById('data').value;
        const k = document.getElementById('key').value;
        try {
            const bytes = CryptoJS.AES.decrypt(msg, k);
            const decoded = bytes.toString(CryptoJS.enc.Utf8);
            document.getElementById('output').innerText = decoded || "INVALID KEY";
        } catch(e) { document.getElementById('output').innerText = "ERROR"; }
    }
</script>
</body>
</html>
