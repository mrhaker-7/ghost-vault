<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ghost Vault | Secure Terminal</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <style>
        :root { --neon: #00ff41; --dark: #050505; --shadow: rgba(0, 255, 65, 0.3); }
        
        body { 
            background: var(--dark); 
            color: var(--neon); 
            font-family: 'Courier New', monospace; 
            display: flex; justify-content: center; align-items: center; 
            min-height: 100vh; margin: 0; 
        }

        .vault-box {
            width: 90%; max-width: 400px;
            padding: 30px;
            border: 2px solid var(--neon);
            box-shadow: 0 0 15px var(--shadow), inset 0 0 15px var(--shadow);
            background: rgba(0, 10, 0, 0.95);
            border-radius: 8px;
            text-align: center;
        }

        h1 { font-size: 22px; letter-spacing: 4px; margin-bottom: 5px; text-transform: uppercase; }
        .status { font-size: 10px; margin-bottom: 25px; opacity: 0.8; }

        textarea, input {
            width: 100%; background: #000; border: 1px solid var(--neon);
            color: var(--neon); padding: 12px; margin-bottom: 15px; 
            box-sizing: border-box; border-radius: 4px; outline: none;
            font-family: inherit;
        }

        textarea:focus, input:focus { box-shadow: 0 0 10px var(--neon); }

        .btns { display: flex; gap: 10px; }
        
        button {
            flex: 1; padding: 15px; cursor: pointer; font-weight: bold;
            background: var(--neon); color: #000; border: none;
            text-transform: uppercase; transition: 0.2s;
        }

        button:active { transform: scale(0.95); }

        button.alt { background: transparent; color: var(--neon); border: 1px solid var(--neon); }

        #output-area {
            margin-top: 20px; padding: 15px; border: 1px dashed var(--neon);
            word-break: break-all; font-size: 12px; min-height: 40px;
            background: rgba(0,255,65,0.05);
        }
    </style>
</head>
<body>

<div class="vault-box">
    <h1>GHOST_VAULT</h1>
    <div class="status">_ENCRYPTION_PROTOCOL_v2.0_READY</div>
    
    <textarea id="userInput" rows="4" placeholder="TYPE SECRET MESSAGE..."></textarea>
    <input type="password" id="userKey" placeholder="ENTER MASTER KEY">
    
    <div class="btns">
        <button onclick="encrypt()">Lock</button>
        <button class="alt" onclick="decrypt()">Unlock</button>
    </div>

    <div id="output-area">_WAITING_FOR_COMMAND_</div>
</div>

<script>
    function encrypt() {
        const secret = document.getElementById('userInput').value;
        const key = document.getElementById('userKey').value;
        if(!key) { alert("ERROR: MASTER KEY REQUIRED"); return; }
        
        // Encrypt logic
        const encrypted = CryptoJS.AES.encrypt(secret, key).toString();
        document.getElementById('output-area').innerText = encrypted;
        document.getElementById('userInput').value = ""; // Safety wipe
    }

    function decrypt() {
        const cipher = document.getElementById('userInput').value;
        const key = document.getElementById('userKey').value;
        
        try {
            const bytes = CryptoJS.AES.decrypt(cipher, key);
            const plainText = bytes.toString(CryptoJS.enc.Utf8);
            if(!plainText) throw new Error();
            document.getElementById('output-area').innerText = "SUCCESS: " + plainText;
        } catch(e) {
            document.getElementById('output-area').innerText = "CRITICAL_ERROR: ACCESS_DENIED";
        }
    }
</script>

</body>
</html>
